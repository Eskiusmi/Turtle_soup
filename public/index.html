<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>海龟汤 · 每日AI谜题</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090d;--surface:#0f1018;--card:#141520;
  --border:#1f2035;--border2:#2a2d45;
  --text:#dde0f0;--muted:#555878;--dim:#333550;
  --yes:#5af0a0;--no:#f05a5a;--maybe:#f0c85a;--irr:#8899cc;
  --accent:#6e7ff3;--accent2:#c084fc;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Mono',monospace;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;padding:1.5rem 1rem 3rem;
}
body::before{
  content:'';position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:500px;height:300px;
  background:radial-gradient(ellipse at top,rgba(110,127,243,.06) 0%,transparent 70%);
  pointer-events:none;
}
.hdr{text-align:center;margin-bottom:1.5rem}
.hdr h1{
  font-family:'Noto Serif SC',serif;
  font-size:clamp(1.8rem,5vw,2.6rem);font-weight:700;letter-spacing:.2em;
  background:linear-gradient(135deg,#8ba4ff,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hdr p{font-size:.65rem;color:var(--muted);letter-spacing:.25em;text-transform:uppercase;margin-top:.3rem}
.wrap{width:100%;max-width:560px;display:flex;flex-direction:column;gap:1rem}

/* loading */
.gen-loading{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:2rem 1.5rem;text-align:center}
.gen-loading p{font-size:.72rem;color:var(--muted);letter-spacing:.1em;margin-top:.8rem}
.gen-sub{font-size:.6rem;color:var(--dim);margin-top:.4rem}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* soup card */
.soup-card{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:1.25rem 1.5rem;position:relative}
.soup-card::before{content:'汤面';position:absolute;top:.6rem;right:.9rem;font-size:.6rem;color:var(--dim);letter-spacing:.15em}
.soup-label{font-size:.6rem;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.6rem}
.soup-text{font-family:'Noto Serif SC',serif;font-size:1rem;line-height:1.85;color:var(--text);font-weight:300}
.date-badge{font-size:.6rem;color:var(--dim);margin-top:.6rem;letter-spacing:.08em}

/* legend */
.legend{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center}
.leg{font-size:.62rem;display:flex;align-items:center;gap:.3rem;color:var(--muted)}
.leg-dot{width:7px;height:7px;border-radius:50%}

/* input */
.input-row{display:flex;gap:.5rem}
input{
  flex:1;background:var(--surface);border:1px solid var(--border2);
  border-radius:9px;color:var(--text);font-family:'DM Mono',monospace;
  font-size:.9rem;padding:.7rem 1rem;outline:none;transition:border-color .2s;
}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--dim)}
input:disabled{opacity:.4}
.ask-btn{
  background:var(--accent);border:none;border-radius:9px;color:#fff;
  font-family:'DM Mono',monospace;font-size:.8rem;font-weight:500;
  padding:.7rem 1.1rem;cursor:pointer;letter-spacing:.05em;
  transition:opacity .15s,transform .1s;white-space:nowrap;
}
.ask-btn:hover{opacity:.85}.ask-btn:active{transform:scale(.97)}.ask-btn:disabled{opacity:.35;cursor:not-allowed}
.status-row{display:flex;justify-content:space-between;align-items:center;font-size:.65rem;color:var(--muted);padding:0 .2rem}

/* thinking */
.thinking{display:none;align-items:center;gap:.6rem;font-size:.7rem;color:var(--muted);padding:.3rem 0}
.dots{display:flex;gap:3px}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:dp 1.2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,80%,100%{opacity:.15}40%{opacity:1}}

/* qa */
.qa-list{display:flex;flex-direction:column;gap:.4rem}
.qa-item{
  display:grid;grid-template-columns:auto 1fr auto;align-items:start;
  gap:.6rem;background:var(--card);border:1px solid var(--border);
  border-radius:9px;padding:.6rem .9rem;animation:si .2s ease;
}
@keyframes si{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.qa-num{font-size:.6rem;color:var(--dim);padding-top:.15rem;min-width:1.4rem}
.qa-q{font-size:.82rem;color:var(--text);line-height:1.5}
.qa-a{font-size:.72rem;font-weight:500;padding:.15rem .55rem;border-radius:4px;white-space:nowrap;align-self:start;margin-top:.05rem}
.a-yes{background:rgba(90,240,160,.12);color:var(--yes)}
.a-no{background:rgba(240,90,90,.12);color:var(--no)}
.a-maybe{background:rgba(240,200,90,.12);color:var(--maybe)}
.a-irr{background:rgba(136,153,204,.12);color:var(--irr)}

/* win */
.win{display:none;background:linear-gradient(135deg,rgba(90,240,160,.07),rgba(110,127,243,.07));border:1px solid rgba(90,240,160,.2);border-radius:14px;padding:1.5rem;text-align:center}
.win.show{display:block;animation:si .3s ease}
.win-icon{font-size:2rem;margin-bottom:.5rem}
.win-title{font-family:'Noto Serif SC',serif;font-size:1.1rem;color:var(--yes);margin-bottom:.4rem}
.win-sub{font-size:.7rem;color:var(--muted);line-height:1.7;margin-bottom:1rem}
.truth-box{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:1rem;text-align:left;margin-bottom:1rem}
.truth-label{font-size:.6rem;color:var(--accent2);letter-spacing:.15em;margin-bottom:.4rem}
.truth-text{font-family:'Noto Serif SC',serif;font-size:.85rem;line-height:1.8;color:var(--text);font-weight:300}
.btn-row{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap}
.share-btn{background:transparent;border:1px solid var(--yes);border-radius:7px;color:var(--yes);font-family:'DM Mono',monospace;font-size:.72rem;padding:.4rem 1rem;cursor:pointer;letter-spacing:.08em;transition:background .15s}
.share-btn:hover{background:rgba(90,240,160,.08)}
.new-btn-sm{background:transparent;border:1px solid var(--border2);border-radius:7px;color:var(--muted);font-family:'DM Mono',monospace;font-size:.72rem;padding:.4rem 1rem;cursor:pointer;letter-spacing:.08em;transition:all .15s}
.new-btn-sm:hover{border-color:var(--accent);color:var(--accent)}

.err{font-size:.68rem;color:var(--no);text-align:center;min-height:.9rem}
.hint-tip{font-size:.65rem;color:var(--accent2);text-align:center;padding:.2rem 0;display:none;animation:si .3s ease}
</style>
</head>
<body>

<div class="hdr">
  <h1>海龟汤</h1>
  <p>每日一题 · AI出题 · 问是否 · 还原真相</p>
</div>

<div class="wrap">
  <div id="gen-loading" class="gen-loading">
    <div class="spinner"></div>
    <p>AI 正在生成今日谜题…</p>
    <div class="gen-sub">每天零点自动更新，全球同一道题</div>
  </div>

  <div id="soup-card" class="soup-card" style="display:none">
    <div class="soup-label">今日汤面</div>
    <div id="soup-text" class="soup-text"></div>
    <div id="date-badge" class="date-badge"></div>
  </div>

  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--yes)"></div>是</div>
    <div class="leg"><div class="leg-dot" style="background:var(--no)"></div>不是</div>
    <div class="leg"><div class="leg-dot" style="background:var(--maybe)"></div>是也不是</div>
    <div class="leg"><div class="leg-dot" style="background:var(--irr)"></div>无关</div>
  </div>

  <div class="input-row">
    <input id="q-input" type="text" placeholder="提问（例：他是男性吗？）" maxlength="60" disabled/>
    <button class="ask-btn" id="ask-btn" disabled>问</button>
  </div>
  <div id="err" class="err"></div>
  <div class="status-row">
    <span id="q-count">已提问 0 次</span>
    <span id="status-r"></span>
  </div>
  <div id="hint-tip" class="hint-tip"></div>
  <div id="thinking" class="thinking">
    <div class="dots"><span></span><span></span><span></span></div>
    <span>思考中…</span>
  </div>

  <div id="win" class="win">
    <div class="win-icon">✦</div>
    <div class="win-title">真相大白！</div>
    <div class="win-sub" id="win-sub"></div>
    <div class="truth-box">
      <div class="truth-label">完整汤底</div>
      <div id="truth-text" class="truth-text"></div>
    </div>
    <div class="btn-row">
      <button class="share-btn" onclick="copyResult()">复制战绩 分享</button>
      <button class="new-btn-sm" onclick="newGame()">再来一题 ↻</button>
    </div>
  </div>

  <div id="qa-list" class="qa-list"></div>
</div>

<script>
let soup = null;
let questions = [];
let won = false;

function dateKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}
function todayLabel() {
  const d = new Date();
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

async function callClaude(prompt, maxTokens=600) {
  const resp = await fetch('/api/chat', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: maxTokens,
      messages: [{role:'user', content: prompt}]
    })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return (data.content?.[0]?.text ?? '').trim();
}

async function generateDailySoup() {
  const key = 'turtle_soup_v2_' + dateKey();
  const cached = localStorage.getItem(key);
  if (cached) {
    try { return JSON.parse(cached); } catch(e) {}
  }

  const d = new Date();
  const seed = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
  const style = seed % 2 === 0 ? '温情感人类（结局令人动容）' : '悬疑反转类（结局令人意外）';

  const prompt = `你是海龟汤游戏出题人。请生成一道今日原创海龟汤谜题。

风格：${style}
种子数字：${seed}（保证今天全球玩家看到同一道题）

要求：
- 汤面：2-3句话，描述一个反常的、令人困惑的事件，隐去关键信息，制造悬念
- 汤底：完整真相，解释汤面所有奇怪之处，逻辑自洽，有反转或意外性
- 难度适中，玩家通过20-40个是否问题可以猜出
- 内容积极向上，不涉及血腥暴力

严格按以下JSON格式输出，不要任何其他文字：
{"face":"汤面内容","truth":"汤底完整真相"}`;

  let result;
  try {
    const raw = await callClaude(prompt, 500);
    // 清理 markdown 代码块、中文引号、首尾空白
    const clean = raw
      .replace(/```json|```/g, '')
      .replace(/\u201c|\u201d|\u2018|\u2019/g, '"')
      .trim();
    // 用 regex 提取 face 和 truth，比直接 JSON.parse 更健壮
    const faceMatch = clean.match(/"face"\s*:\s*"([\s\S]*?)"\s*,/);
    const truthMatch = clean.match(/"truth"\s*:\s*"([\s\S]*?)"\s*[},]/);
    if (faceMatch && truthMatch) {
      result = { face: faceMatch[1], truth: truthMatch[1] };
    } else {
      result = JSON.parse(clean);
    }
  } catch(e) {
    result = {
      face: '一名女子每天给丈夫打电话，但从不说话，挂断后却很开心。',
      truth: '她丈夫患有严重失忆症，住在护理院。每次她打来电话，丈夫虽然不记得她是谁，但总会温柔地说没关系然后挂断。她只是想每天听一次他的声音。'
    };
  }

  localStorage.setItem(key, JSON.stringify(result));
  return result;
}

async function judgeQuestion(question) {
  const prompt = `你是海龟汤游戏裁判。

汤面（玩家已知）：${soup.face}
汤底（完整真相，玩家未知）：${soup.truth}

玩家提问：「${question}」

规则：
1. 根据汤底判断答案，只能选：是 / 不是 / 是也不是 / 无关
2. 若玩家的陈述已经基本还原了核心真相（说出了关键转折或核心原因），则判定通关

严格按格式输出，不加任何其他文字：
答案|是否通关

例：「是|false」「不是|false」「是也不是|true」`;

  const raw = await callClaude(prompt, 20);
  const clean = raw.replace(/「|」/g,'').trim();
  const parts = clean.split('|');
  const valid = ['是','不是','是也不是','无关'];
  let answer = (parts[0] ?? '').trim();
  if (!valid.includes(answer)) answer = '无关';
  const solved = (parts[1] ?? '').trim() === 'true';
  return {answer, solved};
}

function answerClass(a) {
  if(a==='是') return 'a-yes';
  if(a==='不是') return 'a-no';
  if(a==='是也不是') return 'a-maybe';
  return 'a-irr';
}

function renderQA() {
  const list = document.getElementById('qa-list');
  list.innerHTML = [...questions].reverse().map((q,i) => `
    <div class="qa-item">
      <span class="qa-num">${questions.length - i}.</span>
      <span class="qa-q">${q.q}</span>
      <span class="qa-a ${answerClass(q.a)}">${q.a}</span>
    </div>`).join('');
  document.getElementById('q-count').textContent = `已提问 ${questions.length} 次`;

  const yesCount = questions.filter(x => x.a === '是').length;
  const tip = document.getElementById('hint-tip');
  if (yesCount >= 6 && !won) {
    tip.textContent = '线索已经不少，试着描述你认为的完整真相？';
    tip.style.display = 'block';
  } else if (yesCount >= 3 && !won) {
    tip.textContent = '可以开始串联线索，逐步缩小范围。';
    tip.style.display = 'block';
  } else {
    tip.style.display = 'none';
  }
}

function showWin() {
  won = true;
  document.getElementById('win').classList.add('show');
  document.getElementById('win-sub').textContent =
    `共提问 ${questions.length} 次，还原了今日汤底 · ${todayLabel()}`;
  document.getElementById('truth-text').textContent = soup.truth;
  document.getElementById('ask-btn').disabled = true;
  document.getElementById('q-input').disabled = true;
  document.getElementById('hint-tip').style.display = 'none';
}

function copyResult() {
  const d = new Date();
  const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
  const icons = questions.map(q => {
    if(q.a==='是') return '🟩';
    if(q.a==='不是') return '🟥';
    if(q.a==='是也不是') return '🟨';
    return '⬜';
  }).join('');
  const lines = Math.ceil(icons.length / 10);
  let grid = '';
  for(let i=0;i<lines;i++) grid += icons.slice(i*10,(i+1)*10) + '\n';
  const text = `🐢 海龟汤 ${dateStr}\n用了 ${questions.length} 个问题还原真相\n${grid.trim()}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.share-btn');
    btn.textContent = '✓ 已复制';
    setTimeout(() => btn.textContent = '复制战绩 分享', 2000);
  }).catch(() => {
    alert(text);
  });
}

async function newGame() {
  won = false;
  questions = [];
  document.getElementById('win').classList.remove('show');
  document.getElementById('qa-list').innerHTML = '';
  document.getElementById('q-count').textContent = '已提问 0 次';
  document.getElementById('hint-tip').style.display = 'none';
  document.getElementById('soup-card').style.display = 'none';
  document.getElementById('gen-loading').style.display = 'block';
  document.getElementById('q-input').disabled = true;
  document.getElementById('ask-btn').disabled = true;

  const seed = Date.now();
  const prompt = `你是海龟汤出题人。生成一道原创海龟汤，风格自由，种子：${seed}。
严格按JSON输出：{"face":"汤面","truth":"汤底"}`;
  try {
    const raw = await callClaude(prompt, 400);
    const clean = raw
      .replace(/```json|```/g, '')
      .replace(/\u201c|\u201d|\u2018|\u2019/g, '"')
      .trim();
    const faceMatch = clean.match(/"face"\s*:\s*"([\s\S]*?)"\s*,/);
    const truthMatch = clean.match(/"truth"\s*:\s*"([\s\S]*?)"\s*[},]/);
    if (faceMatch && truthMatch) {
      soup = { face: faceMatch[1], truth: truthMatch[1] };
    } else {
      soup = JSON.parse(clean);
    }
  } catch(e) {
    soup = {
      face: '一个人赢得了一场比赛，却没有庆祝，反而流下了眼泪。',
      truth: '这是一场象棋比赛，他的对手是他的父亲。父亲患了阿尔茨海默症，已经认不出他了。但在比赛中，父亲却打出了他们年少时研究出的那个秘密开局。他赢了，却感到心碎——父亲忘记了一切，却没有忘记和他下棋的方式。'
    };
  }

  document.getElementById('gen-loading').style.display = 'none';
  document.getElementById('soup-card').style.display = 'block';
  document.getElementById('soup-text').textContent = soup.face;
  document.getElementById('date-badge').textContent = `加餐题 · ${todayLabel()}`;
  document.getElementById('q-input').disabled = false;
  document.getElementById('ask-btn').disabled = false;
  document.getElementById('q-input').focus();
}

async function doAsk() {
  if (won) return;
  const input = document.getElementById('q-input');
  const q = input.value.trim();
  const err = document.getElementById('err');
  err.textContent = '';
  if (!q) { err.textContent = '请输入问题'; return; }
  if (q.length < 3) { err.textContent = '问题太短，请描述具体一点'; return; }

  document.getElementById('ask-btn').disabled = true;
  input.disabled = true;
  document.getElementById('thinking').style.display = 'flex';

  try {
    const {answer, solved} = await judgeQuestion(q);
    questions.push({q, a: answer});
    input.value = '';
    renderQA();
    if (solved) showWin();
  } catch(e) {
    err.textContent = '网络错误，请重试';
  } finally {
    document.getElementById('thinking').style.display = 'none';
    if (!won) {
      document.getElementById('ask-btn').disabled = false;
      input.disabled = false;
      input.focus();
    }
  }
}

async function init() {
  try {
    soup = await generateDailySoup();
    document.getElementById('gen-loading').style.display = 'none';
    document.getElementById('soup-card').style.display = 'block';
    document.getElementById('soup-text').textContent = soup.face;
    document.getElementById('date-badge').textContent = todayLabel();
    document.getElementById('q-input').disabled = false;
    document.getElementById('ask-btn').disabled = false;
    document.getElementById('q-input').focus();
  } catch(e) {
    document.getElementById('gen-loading').innerHTML =
      '<p style="color:#f05a5a;font-size:.75rem">生成失败，请刷新重试</p>';
  }
}

document.getElementById('ask-btn').addEventListener('click', doAsk);
document.getElementById('q-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doAsk();
});

init();
</script>
</body>
</html>
